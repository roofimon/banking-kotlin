<div class="cb-page">
  <h1 class="cb-page-title">Send</h1>

  <div class="cb-card">
    <div class="mb-4">
      <label class="form-label">From</label>
      <input type="text" class="form-control" [(ngModel)]="srcId" placeholder="Account ID (e.g. A123)" />
    </div>

    <div class="mb-4">
      <label class="form-label">Amount</label>
      <div class="input-group">
        <span class="input-group-text">$</span>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="amount"
          placeholder="0.00"
          min="0.01"
          step="0.01"
        />
      </div>
    </div>

    <div class="mb-5">
      <label class="form-label">To</label>
      <input type="text" class="form-control" [(ngModel)]="destId" placeholder="Account ID (e.g. C456)" />
    </div>

    <div class="d-flex gap-2">
      <button
        class="btn btn-primary flex-grow-1"
        (click)="submit()"
        [disabled]="loading || !isFormValid"
      >
        {{ loading ? 'Sending…' : 'Send Now' }}
      </button>
      <button class="btn btn-outline-secondary" (click)="reset()" [disabled]="loading">
        Clear
      </button>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <app-transfer-receipt *ngIf="receipt" [receipt]="receipt"></app-transfer-receipt>
</div>
