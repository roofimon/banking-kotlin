<div class="cb-page">
  <h1 class="cb-page-title">Portfolio</h1>

  <div class="cb-card">
    <p class="cb-card-label">Account ID</p>
    <div class="input-group">
      <input
        type="text"
        class="form-control"
        placeholder="e.g. A123"
        [(ngModel)]="accountId"
        (keyup.enter)="lookup()"
      />
      <button
        class="btn btn-primary"
        style="border-radius: 0 10px 10px 0;"
        (click)="lookup()"
        [disabled]="loading || !accountId.trim()"
      >
        {{ loading ? 'Loading…' : 'Look Up' }}
      </button>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <div *ngIf="account" class="cb-balance-card">
    <div class="cb-account-id">Account · {{ account.id }}</div>
    <div class="cb-balance-label">Available Balance</div>
    <div class="cb-balance-amount">{{ account.balance | currency:'USD':'symbol':'1.2-2' }}</div>
  </div>
</div>
