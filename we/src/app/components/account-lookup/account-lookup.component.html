<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <h2 class="mb-4">Account Lookup</h2>

    <div class="card p-4 mb-3 shadow-sm">
      <div class="input-group">
        <input
          type="text"
          class="form-control"
          placeholder="Account ID (e.g. A123)"
          [(ngModel)]="accountId"
          (keyup.enter)="lookup()"
        />
        <button
          class="btn btn-primary"
          (click)="lookup()"
          [disabled]="loading || !accountId.trim()"
        >
          {{ loading ? 'Loading…' : 'Look Up' }}
        </button>
      </div>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

    <div *ngIf="account" class="card shadow-sm">
      <div class="card-header fw-bold">Account Details</div>
      <div class="card-body">
        <table class="table table-bordered mb-0">
          <tbody>
            <tr>
              <th scope="row" class="w-50">Account ID</th>
              <td>{{ account.id }}</td>
            </tr>
            <tr>
              <th scope="row">Balance</th>
              <td>{{ account.balance | currency:'USD' }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
