<div class="cb-page">
  <h1 class="cb-page-title">Deposit</h1>

  <div class="cb-card">
    <div class="mb-4">
      <label class="form-label">Account ID</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="accountId"
        placeholder="Account ID (e.g. A123)"
      />
    </div>

    <div class="mb-5">
      <label class="form-label">Amount</label>
      <div class="input-group">
        <span class="input-group-text">$</span>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="amount"
          placeholder="0.00"
          min="0.01"
          step="0.01"
        />
      </div>
    </div>

    <div class="d-flex gap-2">
      <button
        class="btn btn-primary flex-grow-1"
        (click)="submit()"
        [disabled]="loading || !isFormValid"
      >
        {{ loading ? 'Depositing…' : 'Deposit Now' }}
      </button>
      <button class="btn btn-outline-secondary" (click)="reset()" [disabled]="loading">
        Clear
      </button>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <app-deposit-receipt *ngIf="receipt" [receipt]="receipt"></app-deposit-receipt>
</div>
